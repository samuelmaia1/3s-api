<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        body {
            font-family: Arial, sans-serif;
            font-size: 12px;
            line-height: 1.6;
        }

        h1, h2 {
            text-align: center;
        }

        .clause {
            margin-top: 20px;
        }

        .items-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .items-table th, .items-table td {
            border: 1px solid #000;
            padding: 6px;
        }
    </style>
</head>
<body>
<h1>CONTRATO DE PRESTAÇÃO DE SERVIÇOS</h1>

<p>
    Pedido nº <span th:text="${order.id}"></span><br/>
    Data: <span th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy')}"></span>
</p>

<p>
    Cliente: <span th:text="${order.costumer.name}"></span><br/>
    Valor total: R$ <span th:text="${order.total}"></span>
</p>
<h2>Itens do Pedido</h2>

<table class="items-table">
    <thead>
    <tr>
        <th>Produto</th>
        <th>Qtd</th>
        <th>Valor Unit.</th>
        <th>Subtotal</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="item : ${order.items}">
        <td th:text="${item.product.name}"></td>
        <td th:text="${item.quantity}"></td>
        <td th:text="${item.unitValue}"></td>
        <td th:text="${item.subTotal}"></td>
    </tr>
    </tbody>
</table>
<div th:each="clause : ${clauses}" class="clause">
    <h2 th:text="${clause.title}"></h2>

    <p th:text="${clause.mainText}"></p>

    <p th:each="paragraph : ${clause.paragraphs}"
       th:text="${paragraph}">
    </p>
</div>
<br/><br/>
<p>__________________________________________</p>
<p>Assinatura do Cliente</p>

</body>
</html>
